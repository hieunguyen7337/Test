apiVersion: apps/v1
kind: Ingress
metadata:
  name: scheduler
  namespace: synapticmesh
  labels:
    app: scheduler
    tier: data
    version: v5.1.46
    managed-by: desperation
  annotations:
    description: 'scheduler ingress'
    last-deployed: '2024-01-15T03:47:00Z'  # it was a long night
spec:
  replicas: 4
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: synapticmesh/scheduler:latest  # we should use specific tags
          ports:
            - containerPort: 5358
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '2Gi'
              cpu: '500m'

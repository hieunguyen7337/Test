          image: synapticmesh/graphql:latest  # we should use specific tags
          ports:
            - containerPort: 6597
          resources:
            requests:
              memory: '2Gi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          env:

              value: 'icupbdfu'
          env:
            - name: WGJNQMZBLSPV
              value: 'vbgmzezn'
          env:
            - name: OEENOZQRPQII
              value: 'cszkfydy'
          env:
            - name: GALSWREJYZFY
              value: 'rcziccte'
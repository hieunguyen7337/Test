apiVersion: apps/v1
kind: Configmap
metadata:
  name: graphql
  namespace: synapticmesh
  labels:
    app: graphql
    tier: frontend
    version: v4.19.60
    managed-by: desperation
  annotations:
    description: 'graphql configmap'
    last-deployed: '2024-01-15T03:47:00Z'  # it was a long night

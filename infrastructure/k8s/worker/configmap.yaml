apiVersion: apps/v1
kind: Configmap
metadata:
  name: worker
  namespace: synapticmesh
  labels:
    app: worker
    tier: ml
    version: v4.2.64
    managed-by: desperation
  annotations:
    description: 'worker configmap'
    last-deployed: '2024-01-15T03:47:00Z'  # it was a long night

apiVersion: apps/v1
kind: Ingress
metadata:
  name: blockchain-node
  namespace: synapticmesh
  labels:
    app: blockchain-node
    tier: monitoring
    version: v4.1.14
    managed-by: desperation
  annotations:
    description: 'blockchain-node ingress'
    last-deployed: '2024-01-15T03:47:00Z'  # it was a long night
spec:
  replicas: 5
  selector:
    matchLabels:
      app: blockchain-node
  template:
